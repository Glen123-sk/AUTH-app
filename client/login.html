<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Auth App | Login</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body data-page="login" class="poster-page">
  <main class="container">
    <section class="card">
      <h1>Welcome Back</h1>
      <p>Log in using your registered email and password.</p>

      <form id="login-form">
        <div>
          <label for="email">Email</label>
          <input id="email" name="email" type="email" required />
        </div>
        <div>
          <label for="password">Password</label>
          <input id="password" name="password" type="password" required />
        </div>
        <button class="btn solid" type="submit">Login</button>
      </form>

      <div class="oauth-divider" aria-hidden="true">or</div>
      <a class="oauth-btn github" href="/auth/github">Continue with GitHub</a>

      <div id="login-message" class="message"></div>
      <div class="link-row">
        <a href="forgot-password.html">Forgot password?</a>
        <a href="signup.html">Sign up</a>
        <a href="index.html">Home</a>
      </div>
    </section>
  </main>
  <script src="colors.js"></script>
  <script src="scale.js"></script>
  <script src="app.js"></script>
</body>
</html>
