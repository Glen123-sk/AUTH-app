<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In with GitHub - Example</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    }

    .container {
      background: white;
      padding: 40px;
      border-radius: 10px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
      text-align: center;
      width: 100%;
      max-width: 400px;
    }

    h1 {
      color: #333;
      margin: 0 0 10px 0;
      font-size: 24px;
    }

    .subtitle {
      color: #666;
      margin-bottom: 30px;
      font-size: 14px;
    }

    .auth-options {
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    .btn {
      padding: 12px 24px;
      border: none;
      border-radius: 6px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      text-decoration: none;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    .btn-github {
      background-color: #24292e;
      color: white;
    }

    .btn-github:hover {
      background-color: #0d1117;
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
    }

    .btn-email {
      background-color: #667eea;
      color: white;
    }

    .btn-email:hover {
      background-color: #5568d3;
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
    }

    .divider {
      margin: 20px 0;
      display: flex;
      align-items: center;
      color: #ccc;
    }

    .divider::before,
    .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background-color: #ccc;
    }

    .divider span {
      padding: 0 10px;
      font-size: 12px;
      text-transform: uppercase;
    }

    .icon {
      width: 20px;
      height: 20px;
    }

    .github-icon-svg {
      fill: currentColor;
    }

    .signup-link {
      margin-top: 20px;
      font-size: 14px;
      color: #666;
    }

    .signup-link a {
      color: #667eea;
      text-decoration: none;
      font-weight: 600;
    }

    .signup-link a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Welcome Back</h1>
    <p class="subtitle">Sign in to your account</p>

    <div class="auth-options">
      <a href="/auth/github" class="btn btn-github">
        <svg class="icon github-icon-svg" viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg">
          <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.012 8.012 0 0 0 16 8c0-4.42-3.58-8-8-8z"/>
        </svg>
        Sign in with GitHub
      </a>

      <div class="divider">
        <span>Or</span>
      </div>

      <a href="/login.html" class="btn btn-email">
        <span>✉️</span>
        Sign in with Email
      </a>
    </div>

    <div class="signup-link">
      Don't have an account? <a href="/signup.html">Sign up</a>
    </div>
  </div>

  <script>
    // Check if there was an error in the GitHub OAuth callback
    const params = new URLSearchParams(window.location.search);
    if (params.has('error')) {
      const error = params.get('error');
      alert('GitHub authentication failed: ' + error);
    }

    // Check if we came from successful GitHub auth
    if (params.has('source') && params.get('source') === 'github') {
      alert('Successfully logged in with GitHub!');
    }
  </script>
</body>
</html>
