<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Auth App | Sign In</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body data-page="reset" class="poster-page">
  <main class="container">
    <section class="card">
      <h1>New Password</h1>
      <p id="reset-hint">Set a new secure password for <strong id="reset-email"></strong>.</p>

      <form id="reset-form">
        <div>
          <label for="password">New password</label>
          <input id="password" name="password" type="password" required />
        </div>
        <div>
          <label for="confirmPassword">Confirm password</label>
          <input id="confirmPassword" name="confirmPassword" type="password" required />
        </div>
        <button class="btn solid" type="submit">Save Password</button>
      </form>

      <div id="reset-message" class="message"></div>
      <div class="link-row">
        <a href="login.html">Back to loginn</a>
        <a href="index.html">Home</a>
      </div>
    </section>
  </main>
  <script src="config.js"></script>
  <script src="colors.js"></script>
  <script src="scale.js"></script>
  <script type="module" src="reg.js"></script>
  <script src="app.js"></script>
</body>
</html>
