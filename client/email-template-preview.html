<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Email Template Preview</title>
  <style>
    :root {
      --bg: #e9eff7;
      --panel: #ffffff;
      --ink: #0f172a;
      --muted: #475569;
      --line: #c9d7ea;
      --primary: #0ea5e9;
      --warm: #f59e0b;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: 'Trebuchet MS', 'Segoe UI', Arial, sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 10% 5%, #dbeafe 0%, transparent 35%),
        radial-gradient(circle at 88% 4%, #fef3c7 0%, transparent 40%),
        var(--bg);
      min-height: 100vh;
      padding: 24px 14px 40px;
    }
    .wrap {
      max-width: 1180px;
      margin: 0 auto;
    }
    h1 {
      margin: 0 0 8px;
      font-size: clamp(1.5rem, 3vw, 2.2rem);
      letter-spacing: -0.02em;
    }
    .sub {
      margin: 0 0 24px;
      color: var(--muted);
      font-size: 14px;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(280px, 1fr));
      gap: 18px;
    }
    @media (max-width: 920px) {
      .grid { grid-template-columns: 1fr; }
    }
    .shell {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 16px 34px rgba(2, 6, 23, 0.08);
    }
    .tag {
      padding: 10px 14px;
      font-size: 12px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      font-weight: 700;
      color: #1e293b;
      border-bottom: 1px solid var(--line);
      background: #f8fbff;
    }
    iframe {
      border: 0;
      width: 100%;
      height: 760px;
      background: #fff;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Email Template Preview</h1>
    <p class="sub">Desktop and mobile-safe render preview for verification and reset emails.</p>

    <div class="grid">
      <section class="shell">

    </div>
