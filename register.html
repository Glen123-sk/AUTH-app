<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>COM-SERVE Register</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Space+Grotesk:wght@400;600;700&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body data-page="register">
  <div class="bg-layer">
    <div class="orb orb-a"></div>
    <div class="orb orb-b"></div>
    <div class="orb orb-c"></div>
  </div>

  <div id="toastContainer" class="toast-container"></div>
  <div id="modalRoot"></div>

  <main class="landing-shell">
    <section class="landing-auth panel auth-glass" style="max-width: 720px; margin: 0 auto;">
      <div class="auth-title">
        <h2>Create Household Account</h2>
        <p class="muted">Register with your email and chosen name.</p>
      </div>

      <form id="registerForm" class="card login-card">
        <label for="registerName">Your Name</label>
        <input id="registerName" type="text" placeholder="e.g. Sipho Mokoena" required />

        <label for="registerEmail">Email Address</label>
        <input id="registerEmail" type="email" placeholder="name@example.com" required />

        <label for="registerArea">Area</label>
        <select id="registerArea" required>
          <option value="">Select area</option>
          <option value="Section A">Section A</option>
          <option value="Section B">Section B</option>
          <option value="Section C">Section C</option>
          <option value="Section D">Section D</option>
        </select>

        <label for="registerPassword">Password</label>
        <input id="registerPassword" type="password" placeholder="Create password" required />

        <label for="registerConfirmPassword">Confirm Password</label>
        <input id="registerConfirmPassword" type="password" placeholder="Confirm password" required />

        <button class="btn btn-primary" type="submit">Create Account</button>
        <a href="index.html" class="tiny-link">Back to login</a>
      </form>

      <p id="registerMessage" class="message"></p>
    </section>
  </main>

  <footer class="page-footer public-footer">COM-SERVE | Community Funeral Contribution System</footer>

  <script src="script.js"></script>
</body>
</html>
